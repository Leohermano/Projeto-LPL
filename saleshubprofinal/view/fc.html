<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fale Conosco</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <header>
    <div class="logo">GestãoVendas</div>

    <nav>
      <a href="#">Início</a>
      <a href="#">Funcionalidades</a>
      <a href="#">Planos</a>
      <a href="#">Fale Conosco</a>
    </nav>
  </header>

  <section class="container">
    <h1>Fale Conosco</h1>
    <p>Tem alguma dúvida ou precisa de ajuda? Envie uma mensagem para nossa equipe.</p>

    <div class="form-box">
      <form>
        
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Digite seu nome" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Digite seu e-mail" required>

        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" placeholder="Digite sua mensagem" required></textarea>

        <button type="submit">Enviar mensagem</button>

      </form>
    </div>
  </section>

  <footer>
    <p>©️ 2026 GestãoVendas - Sistema de Gestão de Vendas</p>
  </footer>

</body>
</html>
