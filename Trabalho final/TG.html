<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Grátis</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f5f7fa;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

.cta-section {
    width: 100%;
    max-width: 600px;
    text-align: center;
    padding: 30px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* BOTÃO PRINCIPAL */
.btn-cta {
    display: block;
    width: 100%;
    background-color: #007bff;
    color: #fff;
    font-size: 1.2rem;
    font-weight: bold;

    padding: 15px;
    border-radius: 10px;
    border: none;
    cursor: pointer;

    margin-top: 15px;
}

.btn-cta:hover {
    background-color: #0069d9;
}

/* BOTÃO VOLTAR */
.btn-voltar {
    display: block;
    margin-top: 15px;
    color: #555;
    text-decoration: none;
    font-size: 0.9rem;
}
</style>

</head>
<body>

<section class="cta-section">

    <h2>Teste grátis</h2>

    <!-- FORMULÁRIO -->
    <form>

        <input type="text" placeholder="Nome completo" required>

        <input type="text" placeholder="WhatsApp com DDD" required>

        <input type="email" placeholder="E-mail" required>

        <!-- BOTÃO CONTINUAR -->
        <button type="submit" class="btn-cta">
            Continuar →
        </button>

    </form>

    <!-- BOTÃO VOLTAR -->
    <a href="index.html" class="btn-voltar">
        ← Voltar
    </a>

</section>

</body>
</html>
